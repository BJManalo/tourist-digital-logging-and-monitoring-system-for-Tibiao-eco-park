<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Portal - Tibiao Tourism</title>
    
    <link rel="stylesheet" href="../css/fonts.css">
    <link rel="stylesheet" href="../css/style.css">
    
    <script src="../js/vendor/lucide.js"></script>

    <style>
        :root {
            --login-primary: #10b981;
            --login-bg: #f8fafc;
        }

        body {
            background-color: var(--login-bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.05) 0px, transparent 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 100%;
            max-width: 400px;
            padding: 3rem;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.5);
            position: relative;
            z-index: 10;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-circle {
            width: 90px;
            height: 90px;
            margin: 0 auto 1.5rem;
            background: white;
            border-radius: 50%;
            padding: 5px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .logo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .login-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.75rem;
            font-weight: 800;
            color: #1e293b;
            margin: 0;
            letter-spacing: -1px;
        }

        .login-subtitle {
            font-size: 0.9rem;
            color: #64748b;
            margin-top: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: #475569;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .input-wrapper .input-icon, 
        .input-wrapper .input-icon + svg {
            position: absolute !important;
            left: 1.25rem !important;
            top: 50% !important;
            transform: translateY(-50%) !important;
            color: #94a3b8 !important;
            width: 18px !important;
            height: 18px !important;
            pointer-events: none !important;
            z-index: 10 !important;
            transition: all 0.3s ease !important;
        }

        .toggle-password {
            position: absolute !important;
            right: 1.25rem !important;
            top: 50% !important;
            transform: translateY(-50%) !important;
            background: none !important;
            border: none !important;
            color: #94a3b8 !important;
            cursor: pointer !important;
            padding: 0 !important;
            z-index: 20 !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }

        .toggle-password:hover {
            color: var(--login-primary) !important;
        }

        .form-group input {
            width: 100%;
            padding: 0.85rem 3.5rem 0.85rem 3rem;
            border: 2px solid #f1f5f9;
            border-radius: 16px;
            background: white;
            font-size: 1rem;
            font-weight: 600;
            color: #1e293b;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--login-primary);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .form-group input:focus ~ .input-icon,
        .form-group input:focus ~ svg:not(.lucide-eye):not(.lucide-eye-off) {
            color: var(--login-primary) !important;
        }

        .btn-login {
            width: 100%;
            padding: 1.125rem;
            background: var(--login-primary);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 2rem;
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(16, 185, 129, 0.4);
            filter: brightness(1.05);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .back-home {
            text-align: center;
            margin-top: 2rem;
        }

        .back-home a {
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }

        .back-home a:hover {
            color: var(--login-primary);
        }

        .error-message {
            background: #fef2f2;
            color: #dc2626;
            padding: 0.85rem;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: none;
            border: 1px solid #fee2e2;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Loading state */
        .btn-login.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            display: none;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-login.loading .spinner { display: block; }
        .btn-login.loading span { display: none; }
        .btn-login.loading i { display: none; }

    </style>
</head>

<body>
    <div class="login-card fade-in">
        <div class="login-header">
            <div class="logo-circle">
                <img src="../images/logo.png" alt="Tibiao Tourism Logo">
            </div>
            <h1 class="login-title">Management</h1>
            <p class="login-subtitle">Log in to your account</p>
        </div>

        <div id="error-box" class="error-message"></div>

        <form id="unified-login-form">
            <div class="form-group">
                <label for="username">Email Address</label>
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="Enter your email" required autofocus>
                    <i data-lucide="mail" class="input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required>
                    <i data-lucide="lock" class="input-icon"></i>
                    <button type="button" class="toggle-password" onclick="togglePassword()">
                        <i data-lucide="eye-off" id="eye-icon" style="width: 20px; height: 20px;"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-login" id="submit-btn">
                <span>Log in</span>
                <div class="spinner"></div>
            </button>
        </form>


    </div>

    <script>
        lucide.createIcons();

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.setAttribute('data-lucide', 'eye');
            } else {
                passwordInput.type = 'password';
                eyeIcon.setAttribute('data-lucide', 'eye-off');
            }
            lucide.createIcons();
        }

        const loginForm = document.getElementById('unified-login-form');
        const errorBox = document.getElementById('error-box');
        const submitBtn = document.getElementById('submit-btn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Reset UI
            errorBox.style.display = 'none';
            submitBtn.classList.add('loading');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Save user session
                    localStorage.setItem('currentUser', JSON.stringify(data));
                    
                    // Route based on level
                    if (data.level === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'staff.html';
                    }
                } else {
                    errorBox.innerText = data.error || 'Invalid username or password';
                    errorBox.style.display = 'block';
                    submitBtn.classList.remove('loading');
                }
            } catch (err) {
                errorBox.innerText = 'Network error. Please try again later.';
                errorBox.style.display = 'block';
                submitBtn.classList.remove('loading');
            }
        });
    </script>
</body>

</html>
