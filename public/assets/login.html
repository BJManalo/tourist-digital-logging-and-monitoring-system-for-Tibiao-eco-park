<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Login - Tibiao Tourism</title>
    <link rel="stylesheet" href="css/fonts.css">
    <script src="js/vendor/lucide.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --primary: #10b981;
            --main-bg: #f8fafc;
        }

        body {
            background-color: var(--main-bg);
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        #login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #ffffff !important;
            position: relative;
            overflow: hidden;
        }

        .login-card {
            background: #ffffff;
            padding: 3rem;
            border-radius: 2rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 420px;
            z-index: 10;
            border: 1px solid #e2e8f0;
        }

        .btn-primary {
            background: var(--primary) !important;
            color: white;
            padding: 1rem;
            border-radius: 12px;
            border: none;
            width: 100%;
            font-weight: 700;
            cursor: pointer;
            box-shadow: none !important;
        }
    </style>
</head>

<body>
    <div id="login-screen">
        <div class="login-card fade-in">
            <div class="logo-container" style="width: 110px; height: 110px; margin: 0 auto 1.5rem;">
                <img src="images/logo.png" alt="Logo" class="app-logo">
            </div>
            <h2 style="text-align: center; font-family: 'Montserrat'; margin-bottom: 0.5rem;">Portal Login</h2>
            <p style="text-align: center; color: #64748b; margin-bottom: 2.5rem; font-weight: 500;">Access the
                management system</p>

            <form id="login-form">
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter username" required
                        style="padding: 0.8rem 1.25rem; border: 1px solid #e2e8f0; border-radius: 8px; width: 100%;">
                </div>
                <div class="form-group" style="margin-bottom: 2rem;">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required
                        style="padding: 0.8rem 1.25rem; border: 1px solid #e2e8f0; border-radius: 8px; width: 100%;">
                </div>
                <button type="submit" class="btn-primary">
                    Log in
                </button>
            </form>
            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="index.html" style="color: #64748b; text-decoration: none; font-size: 0.9rem;">Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const user = await response.json();

                    // Store user info in session/local storage for the portals to use
                    localStorage.setItem('currentUser', JSON.stringify(user));

                    // Redirect based on level
                    if (user.level === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'staff.html';
                    }
                } else {
                    alert("Invalid username or password.");
                }
            } catch (err) {
                console.error('Login Error:', err);
                alert("Server connection error.");
            }
        });

        lucide.createIcons();
    </script>
</body>

</html>
